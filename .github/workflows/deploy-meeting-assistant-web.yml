name: Deploy Meeting Assistant Web

on:
  push:
    branches:
      - cursor/meeting-assistant-app-b594
      - master
    paths:
      - 'meeting-assistant/**'
      - '.github/workflows/deploy-meeting-assistant-web.yml'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: meeting-assistant-web
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: meeting-assistant/package-lock.json

      - name: Install and build web app
        working-directory: meeting-assistant
        run: |
          npm ci
          npx expo export -p web

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: meeting-assistant/dist

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
